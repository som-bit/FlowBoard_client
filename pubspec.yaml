  connectivity_plus: ^7.0.0
  dio: ^5.9.1
  drift: ^2.31.0
  sqlite3_flutter_libs: ^0.5.26  
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^10.0.0
  riverpod: ^3.2.1
  go_router: ^17.1.0
  skeletonizer: ^2.1.3
  flutter_screenutil: ^5.9.3
  uuid: ^4.5.3
  sqlite3: ^2.9.4
  intl: ^0.20.2
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0
  drift_dev: ^2.31.0
  build_runner: ^2.11.1


